[pytest]
# AquaID Test Suite Configuration

# Test discovery
testpaths = tests api_tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Custom markers
markers =
    smoke: Quick sanity checks (subset of tests)
    regression: Full regression suite
    auth: Authentication tests
    identification: Fish identification tests
    aquarium: My Aquarium CRUD tests
    compare: Compare Fish tests
    articles: Explore & Articles tests
    api: Direct API tests (no browser)
    slow: Tests that take >10 seconds (AI calls, etc.)

# Timeout (requires pytest-timeout plugin)
timeout = 60
